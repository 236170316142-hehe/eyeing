<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Installer — Distribution Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060c16;
      --panel: rgba(10, 18, 34, 0.85);
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9;
      --muted: #8897aa;
      --win: #3b82f6;
      --mac: #a78bfa;
      --lin: #f97316;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(6,182,212,0.13), transparent),
        radial-gradient(ellipse 60% 60% at 100% 100%, rgba(37,99,235,0.16), transparent),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    /* ── SHELL ── */
    .shell {
      width: min(1080px, 100%);
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      backdrop-filter: blur(22px);
    }

    /* ── HEADER ── */
    .hdr {
      padding: 22px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.015);
    }

    .hdr h1 {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .hdr p {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.76rem;
      font-weight: 700;
      padding: 6px 13px;
      border-radius: 999px;
      border: 1px solid rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.1);
      color: #6ee7b7;
      white-space: nowrap;
    }

    .live-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 5px #10b981;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── OS BANNER ── */
    .os-strip {
      padding: 10px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.86rem;
      color: var(--muted);
      min-height: 40px;
    }

    .os-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      letter-spacing: 0.01em;
    }
    .os-chip.win { background:rgba(59,130,246,0.18); color:#93c5fd; border:1px solid rgba(59,130,246,0.3); }
    .os-chip.mac { background:rgba(167,139,250,0.18); color:#c4b5fd; border:1px solid rgba(167,139,250,0.3); }
    .os-chip.lin { background:rgba(249,115,22,0.15);  color:#fdba74; border:1px solid rgba(249,115,22,0.3);  }
    .os-chip.unk { background:rgba(255,255,255,0.07); color:#94a3b8;  border:1px solid rgba(255,255,255,0.1); }

    /* ── BODY ── */
    .body {
      display: grid;
      grid-template-columns: 0.75fr 1.25fr;
    }

    .pane-l { padding: 30px; border-right: 1px solid var(--border); min-width: 0; }
    .pane-r { padding: 30px; background: rgba(255,255,255,0.012); min-width: 0; }

    /* ── DOWNLOAD CARD ── */
    .dl-card {
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: rgba(255,255,255,0.025);
    }

    .dl-card-top {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .os-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      font-weight: 800;
    }
    .os-icon.win { background:rgba(59,130,246,0.15);  color:var(--win); }
    .os-icon.mac { background:rgba(167,139,250,0.15); color:var(--mac); }
    .os-icon.lin { background:rgba(249,115,22,0.15);  color:var(--lin); }

    .os-label { font-size: 1.05rem; font-weight: 800; }
    .os-sub   { margin-top: 1px; font-size: 0.8rem; color: var(--muted); }

    .dl-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border: none;
      border-top: 1px solid var(--border);
      color: #fff;
      cursor: pointer;
      transition: filter 0.18s, transform 0.15s;
      letter-spacing: 0.01em;
    }
    .dl-btn:hover  { filter: brightness(1.13); transform: translateY(-1px); }
    .dl-btn:active { transform: translateY(0); }
    .dl-btn.win { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .dl-btn.mac { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
    .dl-btn.lin { background: linear-gradient(135deg, #ea580c, #c2410c); }

    /* multi-OS fallback */
    .multi-grid { display: grid; gap: 10px; }
    .multi-grid .dl-btn { border-radius: 12px; border: 1px solid var(--border); }

    .dl-note {
      margin-top: 14px;
      font-size: 0.81rem;
      color: var(--muted);
      line-height: 1.6;
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }
    .dl-note::before { content:'⚡'; flex-shrink:0; }


    /* ── STEPS TIMELINE ── */
    .steps-heading {
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4b5563;
      margin-bottom: 20px;
    }

    .steps { list-style: none; }

    .step {
      display: flex;
      gap: 13px;
      padding-bottom: 20px;
      position: relative;
    }
    .step:last-child { padding-bottom: 0; }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 14px;
      top: 30px;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.09), transparent);
    }

    .step-num {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.8rem;
      border: 2px solid;
      position: relative;
      z-index: 1;
    }
    .step-num.win { background:rgba(59,130,246,0.14);  border-color:rgba(59,130,246,0.4);  color:#93c5fd; }
    .step-num.mac { background:rgba(167,139,250,0.14); border-color:rgba(167,139,250,0.4); color:#c4b5fd; }
    .step-num.lin { background:rgba(249,115,22,0.14);  border-color:rgba(249,115,22,0.4);  color:#fdba74; }

    .step-body { padding-top: 3px; min-width: 0; }
    .step-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 3px; color: var(--text); }
    .step-desc  { color: var(--muted); font-size: 0.84rem; line-height: 1.6; overflow-wrap: break-word; }

    .step-desc ic {
      display: inline;
      padding: 1px 7px;
      border-radius: 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #cbd5e1;
      font-size: 0.81rem;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
    }

    /* ── TIP BLOCK ── */
    .tip {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.022);
    }

    .tip-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 8px;
    }

    .tip-body {
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .tip code {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(2,6,23,0.7);
      color: #94a3b8;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
      overflow-x: auto;
      white-space: pre;
      word-break: normal;
    }

    @media (max-width: 860px) {
      .body { grid-template-columns: 1fr; }
      .pane-l { border-right: none; border-bottom: 1px solid var(--border); }
      .multi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">

    <header class="hdr">
      <div>
        <h1>Employee Installer Distribution</h1>
        <p>Live build from the Render backend — always includes the latest monitor and configuration.</p>
      </div>
      <div class="live-pill">Live &amp; Ready</div>
    </header>

    <div class="os-strip" id="osBanner">
      <span>Detecting operating system…</span>
    </div>

    <section class="body">

      <div class="pane-l">
        <div id="downloadArea"></div>
        <p class="dl-note">Every download is freshly generated — employees always get the current monitor version and backend URL baked in.</p>
      </div>

      <div class="pane-r">
        <div class="steps-heading" id="stepsHeading">Installation Steps</div>
        <ul class="steps" id="stepsList"></ul>
        <div id="tipArea"></div>
      </div>

    </section>
  </main>

  <script>
    const origin = window.location.origin;

    /* ── OS detection ── */
    function detectOs() {
      const ua = navigator.userAgent || '';
      const pl = navigator.platform   || '';
      if (/Win/i.test(pl)  || /Windows/i.test(ua))   return 'win';
      if (/Mac/i.test(pl)  || /Macintosh/i.test(ua)) return 'mac';
      if (/Linux/i.test(pl)|| /X11/i.test(ua))       return 'lin';
      return null;
    }

    /* ── metadata ── */
    const META = {
      win: { label: 'Windows', icon: '⊞', slug: 'windows', sub: 'Includes Setup.vbs' },
      mac: { label: 'macOS',   icon: '⌘', slug: 'macos',   sub: 'Includes install.command' },
      lin: { label: 'Linux',   icon: '$', slug: 'linux',    sub: 'Includes install.sh' },
    };

    /* ── per-OS steps ── */
    const STEPS = {
      win: [
        {
          t: 'Download the Windows ZIP',
          d: 'Click the download button on the left.'
        },
        {
          t: 'Extract the ZIP',
          d: 'Right-click the file → <em>Extract All</em> and choose a destination folder.'
        },
        {
          t: 'Double-click Setup.vbs',
          d: 'Your browser opens the setup page automatically. Python, Tesseract, and all dependencies install silently in the background — no windows, no prompts required.'
        },
        {
          t: 'Complete the setup form',
          d: 'A browser tab opens automatically. Enter the employee\'s name and click Save.'
        },
        {
          t: 'Done',
          d: 'The monitor starts silently in the background and restarts automatically after every Windows reboot.'
        }
      ],
      mac: [
        {
          t: 'Download the macOS ZIP',
          d: 'Click the download button on the left.'
        },
        {
          t: 'Extract the ZIP',
          d: 'Double-click the ZIP — macOS extracts it to the same folder automatically.'
        },
        {
          t: 'Double-click install.command',
          d: 'Your browser opens the setup page automatically. Python, Tesseract, and all dependencies install silently in the background. If macOS blocks it, right-click → <em>Open</em>, then click <em>Open</em>.'
        },
        {
          t: 'Complete the setup form',
          d: 'A browser tab opens automatically. Enter the employee\'s name and click Save.'
        },
        {
          t: 'Done',
          d: 'The monitor runs silently and auto-starts after every login via a macOS LaunchAgent.'
        }
      ],
      lin: [
        {
          t: 'Download the Linux ZIP',
          d: 'Click the download button on the left.'
        },
        {
          t: 'Extract the ZIP',
          d: 'Run <ic>unzip employee-monitor-linux.zip -d eyeing</ic> in a terminal, or use your file manager.'
        },
        {
          t: 'Run the installer',
          d: 'Open a terminal inside the extracted folder and run <ic>bash install.sh</ic>. Your browser opens automatically and all dependencies install silently in the background.'
        },
        {
          t: 'Complete the setup form',
          d: 'A browser tab opens automatically. Enter the employee\'s name and click Save.'
        },
        {
          t: 'Done',
          d: 'The monitor starts in the background and auto-starts after every reboot via systemd or cron.'
        }
      ]
    };

    /* ── per-OS tips ── */
    const TIPS = {
      win: {
        title: 'Remote install via PowerShell (optional)',
        body:  'Deploy to a remote PC without physical access:',
        get code() {
          return `powershell -ExecutionPolicy Bypass -Command "iwr -UseBasicParsing ${origin}/api/employee/bootstrap.ps1 -OutFile $env:TEMP\\eb.ps1; & $env:TEMP\\eb.ps1"`;
        }
      },
      mac: {
        title: 'Quarantine fix — if install.command is blocked',
        body:  'Open Terminal in the extracted folder and run:',
        code:  'xattr -dr com.apple.quarantine .\nchmod +x install.sh install.command\n./install.command'
      },
      lin: null
    };

    /* ── builders ── */
    function buildDownload(os) {
      if (!os) {
        return `
          <p style="color:var(--muted);font-size:.86rem;margin-bottom:12px;">
            Could not detect your OS — choose the correct platform below:
          </p>
          <div class="multi-grid">
            <a class="dl-btn win" href="/api/employee/windows.zip">⬇ Download Windows ZIP</a>
            <a class="dl-btn mac" href="/api/employee/macos.zip">⬇ Download macOS ZIP</a>
            <a class="dl-btn lin" href="/api/employee/linux.zip">⬇ Download Linux ZIP</a>
          </div>`;
      }
      const m = META[os];
      return `
        <div class="dl-card">
          <div class="dl-card-top">
            <div class="os-icon ${os}">${m.icon}</div>
            <div>
              <div class="os-label">${m.label} Package</div>
              <div class="os-sub">${m.sub}</div>
            </div>
          </div>
          <a class="dl-btn ${os}" href="/api/employee/${m.slug}.zip">⬇ &nbsp;Download ${m.label} Installer</a>
        </div>`;
    }

    function buildSteps(os) {
      if (!os) {
        return `<li class="step"><div class="step-body"><div class="step-desc" style="color:#475569">Select your OS above to see step-by-step instructions.</div></div></li>`;
      }
      return STEPS[os].map((s, i) => `
        <li class="step">
          <div class="step-num ${os}">${i + 1}</div>
          <div class="step-body">
            <div class="step-title">${s.t}</div>
            <div class="step-desc">${s.d}</div>
          </div>
        </li>`).join('');
    }

    function buildTip(os) {
      const t = TIPS[os];
      if (!t) return '';
      return `
        <div class="tip">
          <div class="tip-title">${t.title}</div>
          <div class="tip-body">${t.body}</div>
          <code id="tipCode"></code>
        </div>`;
    }

    /* ── render ── */
    const os = detectOs();
    const banner = document.getElementById('osBanner');

    if (os) {
      const m = META[os];
      banner.innerHTML = `Detected: <span class="os-chip ${os}">${m.icon}&nbsp;${m.label}</span> &nbsp;—&nbsp; showing the installer and guide for your platform.`;
    } else {
      banner.innerHTML = `<span class="os-chip unk">OS unknown</span> &nbsp;—&nbsp; could not detect your platform automatically.`;
    }

    document.getElementById('downloadArea').innerHTML = buildDownload(os);

    if (os) {
      document.getElementById('stepsHeading').textContent = `Installation Steps — ${META[os].label}`;
    }
    document.getElementById('stepsList').innerHTML = buildSteps(os);

    const tipHtml = buildTip(os);
    document.getElementById('tipArea').innerHTML = tipHtml;

    /* set code textContent after inserting (safe, avoids HTML injection) */
    if (tipHtml && os && TIPS[os]) {
      const el = document.getElementById('tipCode');
      if (el) el.textContent = TIPS[os].code;
    }
  </script>
</body>
</html>

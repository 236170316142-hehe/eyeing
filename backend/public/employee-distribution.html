<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Installer — Distribution Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #05090f;
      --surface:  rgba(10, 17, 32, 0.92);
      --surface2: rgba(14, 22, 40, 0.55);
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.05);
      --text:     #f1f5f9;
      --text2:    #94a3b8;
      --text3:    #5a6a7f;
      --green:    #10b981;
      --win:      #3b82f6;
      --mac:      #8b5cf6;
      --lin:      #f97316;
      --radius:   18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 90% 55% at -5% -5%,  rgba(6,182,212,0.09) 0%, transparent 55%),
        radial-gradient(ellipse 70% 65% at 105% 105%, rgba(37,99,235,0.13) 0%, transparent 55%),
        var(--bg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 44px 20px 72px;
    }

    /* ─── SHELL ─────────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 1120px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 48px 120px rgba(0,0,0,0.65),
        0 8px 32px  rgba(0,0,0,0.35);
      backdrop-filter: blur(28px);
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .hdr {
      padding: 26px 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.013);
    }

    .hdr-title {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--text);
    }

    .hdr-sub {
      margin-top: 5px;
      color: var(--text2);
      font-size: 0.875rem;
      font-weight: 400;
      line-height: 1.5;
    }

    /* Live badge */
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 7px 15px;
      border-radius: 999px;
      border: 1px solid rgba(16,185,129,0.22);
      background: rgba(16,185,129,0.07);
      color: #6ee7b7;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(16,185,129,0.08), inset 0 1px 0 rgba(16,185,129,0.1);
      letter-spacing: 0.025em;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green), 0 0 14px rgba(16,185,129,0.45);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.82)} }

    /* ─── OS BANNER ──────────────────────────────────────────── */
    .os-strip {
      padding: 11px 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: var(--text2);
      background: rgba(255,255,255,0.007);
      min-height: 44px;
    }

    .os-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-weight: 600; padding: 3px 11px;
      border-radius: 7px; font-size: 0.8rem; letter-spacing: 0.01em;
    }
    .os-chip.win { background:rgba(59,130,246,0.14); color:#93c5fd; border:1px solid rgba(59,130,246,0.22); }
    .os-chip.mac { background:rgba(139,92,246,0.14); color:#c4b5fd; border:1px solid rgba(139,92,246,0.22); }
    .os-chip.lin { background:rgba(249,115,22,0.11); color:#fdba74; border:1px solid rgba(249,115,22,0.22); }
    .os-chip.unk { background:rgba(255,255,255,0.05); color:#94a3b8; border:1px solid rgba(255,255,255,0.09); }

    /* ─── BODY ───────────────────────────────────────────────── */
    .body {
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    /* ─── LEFT PANE ──────────────────────────────────────────── */
    .pane-l {
      padding: 30px 26px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ─── DOWNLOAD CARD ──────────────────────────────────────── */
    .dl-card {
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.06) inset,
        0 6px 28px rgba(0,0,0,0.25);
      overflow: hidden;
      transition: box-shadow 0.22s, border-color 0.22s;
    }
    .dl-card:hover {
      box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 10px 40px rgba(0,0,0,0.35);
      border-color: rgba(255,255,255,0.14);
    }

    .dl-card-top {
      padding: 22px 22px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .os-icon {
      width: 52px; height: 52px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.45rem; font-weight: 800; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }
    .os-icon.win { background:linear-gradient(145deg,rgba(59,130,246,0.28),rgba(37,99,235,0.14)); color:#60a5fa; border:1px solid rgba(59,130,246,0.18); }
    .os-icon.mac { background:linear-gradient(145deg,rgba(139,92,246,0.28),rgba(109,40,217,0.14)); color:#a78bfa; border:1px solid rgba(139,92,246,0.18); }
    .os-icon.lin { background:linear-gradient(145deg,rgba(249,115,22,0.22),rgba(194,65,12,0.12));  color:#fb923c; border:1px solid rgba(249,115,22,0.18); }

    .os-info { min-width: 0; }
    .os-label { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.015em; }
    .os-sub   { margin-top: 3px; font-size: 0.775rem; color: var(--text3); }

    .dl-divider { height: 1px; background: var(--border); }

    .dl-btn {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; padding: 14px 20px;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      text-align: center; text-decoration: none;
      border: none; color: #fff; cursor: pointer;
      transition: filter 0.18s, opacity 0.18s;
      letter-spacing: 0.01em;
    }
    .dl-btn:hover  { filter: brightness(1.12); }
    .dl-btn:active { filter: brightness(0.95); }
    .dl-btn.win { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
    .dl-btn.mac { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
    .dl-btn.lin { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }

    /* multi-OS fallback */
    .multi-grid { display: grid; gap: 10px; }
    .multi-grid .dl-btn { border-radius: 11px; border: 1px solid var(--border); }

    .dl-note {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 12px 14px;
      border-radius: 11px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,0.015);
      font-size: 0.79rem;
      color: var(--text3);
      line-height: 1.6;
    }
    .dl-note-icon { flex-shrink: 0; font-size: 0.82rem; margin-top: 1px; }

    /* ─── RIGHT PANE ─────────────────────────────────────────── */
    .pane-r {
      padding: 30px 36px;
      min-width: 0;
      overflow-x: hidden;
    }

    /* ─── STEPS TIMELINE ─────────────────────────────────────── */
    .steps-heading {
      font-size: 0.69rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 28px;
    }

    .steps { list-style: none; }

    .step {
      display: flex;
      gap: 16px;
      padding-bottom: 26px;
      position: relative;
    }
    .step:last-child { padding-bottom: 0; }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 15px; top: 33px; bottom: 0;
      width: 1.5px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.09) 0%, transparent 100%);
    }

    .step-num {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
      border: 1.5px solid; position: relative; z-index: 1;
    }
    .step-num.win { background:rgba(59,130,246,0.11); border-color:rgba(59,130,246,0.32); color:#93c5fd; }
    .step-num.mac { background:rgba(139,92,246,0.11); border-color:rgba(139,92,246,0.32); color:#c4b5fd; }
    .step-num.lin { background:rgba(249,115,22,0.11); border-color:rgba(249,115,22,0.32); color:#fdba74; }

    .step-body { padding-top: 4px; min-width: 0; flex: 1; }
    .step-title {
      font-weight: 600; font-size: 0.94rem; margin-bottom: 5px;
      color: var(--text); letter-spacing: -0.01em;
    }
    .step-desc {
      color: var(--text2); font-size: 0.845rem; line-height: 1.65;
      overflow-wrap: break-word; word-break: break-word;
    }

    .step-desc ic {
      display: inline; padding: 2px 8px; border-radius: 5px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: #cbd5e1; font-size: 0.79rem;
      font-family: 'Courier New', monospace; white-space: nowrap;
    }

    /* ─── TIP / POWERSHELL ───────────────────────────────────── */
    .tip {
      margin-top: 28px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(3,8,18,0.55);
      overflow: hidden;
    }

    .tip-header {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }

    .tip-title {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text3);
    }

    .tip-body {
      padding: 12px 16px 6px;
      color: var(--text2); font-size: 0.83rem; line-height: 1.55;
    }

    .tip code {
      display: block;
      padding: 12px 16px;
      color: #94a3b8;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
      overflow-x: auto; white-space: pre; word-break: normal;
      background: rgba(2,5,14,0.6);
      line-height: 1.65;
    }

    .copy-btn {
      flex-shrink: 0;
      padding: 4px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: var(--text2);
      font-size: 0.71rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.11); color: var(--text); }
    .copy-btn.copied {
      color: #6ee7b7;
      border-color: rgba(16,185,129,0.28);
      background: rgba(16,185,129,0.07);
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 960px) {
      body { padding: 20px 12px 48px; }
      .hdr { padding: 20px 22px; }
      .hdr-title { font-size: 1.3rem; }
      .os-strip { padding: 10px 22px; }
      .body { grid-template-columns: 1fr; }
      .pane-l { padding: 24px 22px; border-right: none; border-bottom: 1px solid var(--border); }
      .pane-r { padding: 24px 22px; }
      .multi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">

    <header class="hdr">
      <div>
        <div class="hdr-title">Employee Installer Distribution</div>
        <div class="hdr-sub">Live build from the Render backend — always includes the latest monitor and configuration.</div>
      </div>
      <div class="live-pill">
        <span class="live-dot"></span>
        Live &amp; Ready
      </div>
    </header>

    <div class="os-strip" id="osBanner">
      <span>Detecting operating system…</span>
    </div>

    <section class="body">

      <div class="pane-l">
        <div id="downloadArea"></div>
        <div class="dl-note">
          <span class="dl-note-icon">⚡</span>
          <span>Every download is freshly generated — employees always get the current monitor version and backend URL baked in.</span>
        </div>
      </div>

      <div class="pane-r">
        <div class="steps-heading" id="stepsHeading">Installation Steps</div>
        <ul class="steps" id="stepsList"></ul>
        <div id="tipArea"></div>
      </div>

    </section>
  </main>

  <script>
    const origin = window.location.origin;

    function detectOs() {
      const ua = navigator.userAgent || '', pl = navigator.platform || '';
      if (/Win/i.test(pl)   || /Windows/i.test(ua))   return 'win';
      if (/Mac/i.test(pl)   || /Macintosh/i.test(ua)) return 'mac';
      if (/Linux/i.test(pl) || /X11/i.test(ua))       return 'lin';
      return null;
    }

    const META = {
      win: { label: 'Windows', icon: '⊞', slug: 'windows', sub: 'Includes install.bat' },
      mac: { label: 'macOS',   icon: '⌘', slug: 'macos',   sub: 'Includes install.command' },
      lin: { label: 'Linux',   icon: '$', slug: 'linux',    sub: 'Includes install.sh' },
    };

    const STEPS = {
      win: [
        { t: 'Download the Windows ZIP',  d: 'Click the download button on the left.' },
        { t: 'Extract the ZIP',           d: 'Right-click the file → <em>Extract All</em> and choose a destination folder.' },
        { t: 'Double-click install.bat',  d: 'Your browser opens the setup page automatically. Python, Tesseract, and all dependencies install silently in the background — no windows, no prompts required.' },
        { t: 'Complete the setup form',   d: 'A browser tab opens automatically. Enter the employee\'s name and click Save.' },
        { t: 'Done',                      d: 'The monitor starts silently in the background and restarts automatically after every Windows reboot.' }
      ],
      mac: [
        { t: 'Download the macOS ZIP',       d: 'Click the download button on the left.' },
        { t: 'Extract the ZIP',              d: 'Double-click the ZIP — macOS extracts it to the same folder automatically.' },
        { t: 'Double-click install.command', d: 'Your browser opens the setup page automatically. Python, Tesseract, and all dependencies install silently in the background. If macOS blocks it, right-click → <em>Open</em>, then click <em>Open</em>.' },
        { t: 'Complete the setup form',      d: 'A browser tab opens automatically. Enter the employee\'s name and click Save.' },
        { t: 'Done',                         d: 'The monitor runs silently and auto-starts after every login via a macOS LaunchAgent.' }
      ],
      lin: [
        { t: 'Download the Linux ZIP', d: 'Click the download button on the left.' },
        { t: 'Extract the ZIP',        d: 'Run <ic>unzip employee-monitor-linux.zip -d eyeing</ic> in a terminal, or use your file manager.' },
        { t: 'Run the installer',      d: 'Open a terminal inside the extracted folder and run <ic>bash install.sh</ic>. Your browser opens automatically and all dependencies install silently in the background.' },
        { t: 'Complete the setup form',d: 'A browser tab opens automatically. Enter the employee\'s name and click Save.' },
        { t: 'Done',                   d: 'The monitor starts in the background and auto-starts after every reboot via systemd or cron.' }
      ]
    };

    const TIPS = {
      win: {
        title: 'Remote Install via PowerShell (Optional)',
        body:  'Deploy to a remote PC without physical access:',
        get code() { return `powershell -ExecutionPolicy Bypass -Command "iwr -UseBasicParsing ${origin}/api/employee/bootstrap.ps1 -OutFile $env:TEMP\\eb.ps1; & $env:TEMP\\eb.ps1"`; }
      },
      mac: {
        title: 'Quarantine Fix — if install.command is blocked',
        body:  'Open Terminal in the extracted folder and run:',
        code:  'xattr -dr com.apple.quarantine .\nchmod +x install.sh install.command\n./install.command'
      },
      lin: null
    };

    const DL_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;

    function buildDownload(os) {
      if (!os) {
        return `<p style="color:var(--text2);font-size:.875rem;margin-bottom:14px;">Could not detect your OS — choose a platform:</p>
          <div class="multi-grid">
            <a class="dl-btn win" href="/api/employee/windows.zip">${DL_ICON} Download Windows ZIP</a>
            <a class="dl-btn mac" href="/api/employee/macos.zip">${DL_ICON} Download macOS ZIP</a>
            <a class="dl-btn lin" href="/api/employee/linux.zip">${DL_ICON} Download Linux ZIP</a>
          </div>`;
      }
      const m = META[os];
      return `
        <div class="dl-card">
          <div class="dl-card-top">
            <div class="os-icon ${os}">${m.icon}</div>
            <div class="os-info">
              <div class="os-label">${m.label} Package</div>
              <div class="os-sub">${m.sub}</div>
            </div>
          </div>
          <div class="dl-divider"></div>
          <a class="dl-btn ${os}" href="/api/employee/${m.slug}.zip">${DL_ICON} Download ${m.label} Installer</a>
        </div>`;
    }

    function buildSteps(os) {
      if (!os) return `<li class="step"><div class="step-body"><div class="step-desc" style="color:var(--text3)">Select your OS above to see step-by-step instructions.</div></div></li>`;
      return STEPS[os].map((s, i) => `
        <li class="step">
          <div class="step-num ${os}">${i + 1}</div>
          <div class="step-body">
            <div class="step-title">${s.t}</div>
            <div class="step-desc">${s.d}</div>
          </div>
        </li>`).join('');
    }

    function buildTip(os) {
      const t = TIPS[os];
      if (!t) return '';
      return `
        <div class="tip">
          <div class="tip-header">
            <div class="tip-title">${t.title}</div>
            <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy</button>
          </div>
          <div class="tip-body">${t.body}</div>
          <code id="tipCode"></code>
        </div>`;
    }

    /* ── render ── */
    const os = detectOs();

    if (os) {
      const m = META[os];
      document.getElementById('osBanner').innerHTML =
        `Detected: <span class="os-chip ${os}">${m.icon}&nbsp;${m.label}</span> &nbsp;—&nbsp; showing the installer and guide for your platform.`;
    } else {
      document.getElementById('osBanner').innerHTML =
        `<span class="os-chip unk">OS unknown</span> &nbsp;—&nbsp; could not detect your platform automatically.`;
    }

    document.getElementById('downloadArea').innerHTML = buildDownload(os);
    if (os) document.getElementById('stepsHeading').textContent = `Installation Steps — ${META[os].label}`;
    document.getElementById('stepsList').innerHTML = buildSteps(os);

    const tipHtml = buildTip(os);
    document.getElementById('tipArea').innerHTML = tipHtml;
    if (tipHtml && os && TIPS[os]) {
      const el = document.getElementById('tipCode');
      if (el) el.textContent = TIPS[os].code;
    }

    function copyCode() {
      const el  = document.getElementById('tipCode');
      const btn = document.getElementById('copyBtn');
      if (!el || !btn) return;
      const done = () => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(el.textContent).then(done).catch(() => fallback(el.textContent, done));
      } else {
        fallback(el.textContent, done);
      }
    }
    function fallback(text, cb) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); cb(); } catch(e) {}
      document.body.removeChild(ta);
    }
  </script>
</body>
</html>
